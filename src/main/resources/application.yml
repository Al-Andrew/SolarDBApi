server:
  port: 8080

spring:
  application:
    name: solardb-api
  datasource:
    # If your platform provides DB_URL as "postgres://...", the app normalizes it at startup.
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_DATABASE:${DB_NAME:solardb}}}
    username: ${SPRING_DATASOURCE_USERNAME:${DB_USERNAME:${DB_USER:solardb}}}
    password: ${SPRING_DATASOURCE_PASSWORD:${DB_PASSWORD:solardb}}
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true
    # Managed Postgres can take a bit to accept connections on deploy.
    connect-retries: ${FLYWAY_CONNECT_RETRIES:10}
    connect-retries-interval: ${FLYWAY_CONNECT_RETRIES_INTERVAL:5}

