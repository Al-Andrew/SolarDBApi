server:
  port: 8080

spring:
  application:
    name: solardb-api
  datasource:
    url: ${SPRING_DATASOURCE_URL:${DB_URL:jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_DATABASE:${DB_NAME:solardb}}}}
    username: ${SPRING_DATASOURCE_USERNAME:${DB_USERNAME:${DB_USER:solardb}}}
    password: ${SPRING_DATASOURCE_PASSWORD:${DB_PASSWORD:solardb}}
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true

