server:
  port: 8080

spring:
  application:
    name: solardb-api
  datasource:
    # Sevalla (and most PaaS) inject DB info via environment variables.
    # Local defaults keep `gradle bootRun` working without extra setup.
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:solardb}}
    username: ${SPRING_DATASOURCE_USERNAME:${DB_USERNAME:solardb}}
    password: ${SPRING_DATASOURCE_PASSWORD:${DB_PASSWORD:solardb}}
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true

